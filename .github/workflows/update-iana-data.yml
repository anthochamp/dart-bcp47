name: Update IANA Data

on:
  schedule:
    - cron: "0 6 1 * *" # 1st of every month at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Regenerate IANA data
        run: |
          set -euo pipefail

          dart run scripts/gen_iana_data.dart > /tmp/gen_output.dart

          # Read the copyright line from the existing file so the year range
          # is preserved exactly as the author maintains it.
          copyright=$(grep 'SPDX-FileCopyrightText' lib/src/bcp47_iana_data.dart)

          {
            printf '%s\n' "$copyright"
            printf '//\n'
            printf '// SPDX-License-Identifier: BSD-3-Clause\n'
            printf '\n'
            printf '// ignore_for_file: lines_longer_than_80_chars\n'
            printf '\n'
            # Insert imports just before the "// Subtags Prefix" line
            awk '/^\/\/ Subtags Prefix/{
              print "import '\''bcp47_extended_language_range.dart'\'';"
              print "import '\''bcp47_lang_tag.dart'\'';"
              print ""
            }{ print }' /tmp/gen_output.dart
          } > lib/src/bcp47_iana_data.dart

      - name: Format generated file
        run: dart format lib/src/bcp47_iana_data.dart

      - name: Check for meaningful changes
        id: changes
        run: |
          old_date=$(git show HEAD:lib/src/bcp47_iana_data.dart \
            | grep '// Latest record of interest added date:' \
            | sed 's|// Latest record of interest added date: ||; s/\.$//')
          new_date=$(grep '// Latest record of interest added date:' lib/src/bcp47_iana_data.dart \
            | sed 's|// Latest record of interest added date: ||; s/\.$//')

          if [ "$old_date" = "$new_date" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            git checkout lib/src/bcp47_iana_data.dart
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "date=$new_date" >> "$GITHUB_OUTPUT"
          fi

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        if: steps.changes.outputs.changed == 'true'
        with:
          commit-message: "chore: update IANA data (latest record ${{ steps.changes.outputs.date }})"
          title: "chore: update IANA data (latest record ${{ steps.changes.outputs.date }})"
          body: |
            Automated update of `lib/src/bcp47_iana_data.dart` from the
            [IANA Language Subtag Registry](https://www.iana.org/assignments/language-subtag-registry/language-subtag-registry).

            **Latest record of interest added:** ${{ steps.changes.outputs.date }}
          branch: chore/update-iana-data
          delete-branch: true
          labels: "dependencies"
